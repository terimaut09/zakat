<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Zakat Calculator</title>

<style>

/* ===== Aurora Background ===== */

body{
    margin:0;
    height:100vh;
    font-family:Segoe UI, sans-serif;
    background: linear-gradient(130deg,#020024,#090979,#00d4ff);
    overflow:auto;
    color:white;
}

body::before{
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background:
    radial-gradient(circle at 20% 30%, #00ffd5 0%, transparent 40%),
    radial-gradient(circle at 80% 60%, #ff00f2 0%, transparent 40%),
    radial-gradient(circle at 50% 80%, #00ff88 0%, transparent 40%);
    animation: auroraMove 15s infinite linear;
    z-index:-1;
    opacity:.6;
}

@keyframes auroraMove{
    0%{transform:translate(0,0);}
    50%{transform:translate(-10%, -10%);}
    100%{transform:translate(0,0);}
}

/* ===== Glass Card ===== */

.container{
    max-width:550px;
    margin:40px auto;
    padding:25px;
    border-radius:20px;
    backdrop-filter: blur(15px);
    background:rgba(255,255,255,0.08);
    box-shadow:0 0 40px rgba(0,255,255,.25);
}

/* ===== Heading ===== */

h1{
    text-align:center;
    margin-bottom:20px;
    text-shadow:0 0 15px cyan;
}

/* ===== Inputs ===== */

label{
    font-weight:bold;
    display:block;
    margin-top:12px;
}

input{
    width:100%;
    padding:12px;
    margin-top:6px;
    border:none;
    border-radius:8px;
    background:rgba(255,255,255,.15);
    color:white;
    outline:none;
    font-size:15px;
}

input::placeholder{
    color:#ddd;
}

/* ===== Button ===== */

button{
    margin-top:18px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    color:white;
    background:linear-gradient(90deg,#00ffd5,#ff00f2);
    box-shadow:0 0 20px rgba(0,255,255,.6);
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

/* ===== Result ===== */

.result{
    margin-top:20px;
    padding:18px;
    border-radius:12px;
    background:rgba(0,0,0,.3);
    text-align:center;
    font-size:18px;
    box-shadow:0 0 15px rgba(255,255,255,.2);
}

/* ===== Footer ===== */

.footer{
    text-align:center;
    margin-top:15px;
    font-size:13px;
    opacity:.8;
}

</style>
</head>

<body>

<div class="container">

<h1>🕌 Aurora Zakat Calculator</h1>

<label>Cash / Bank Balance (₹)</label>
<input type="number" id="cash" placeholder="Enter amount">

<label>Gold Value (₹)</label>
<input type="number" id="gold" placeholder="Gold total value">

<label>Silver Value (₹)</label>
<input type="number" id="silver" placeholder="Silver total value">

<label>Business Assets / Investments (₹)</label>
<input type="number" id="business" placeholder="Investments value">

<label>Debts / Loans (₹)</label>
<input type="number" id="debts" placeholder="Liabilities">

<button onclick="calculateZakat()">Calculate Zakat</button>

<div class="result" id="result">
Enter values to calculate Zakat
</div>

<div class="footer">
Zakat Rate: 2.5% | Made With ❤️
</div>

</div>

<script>

function value(id){
    return parseFloat(document.getElementById(id).value) || 0;
}

function calculateZakat(){

let cash=value("cash");
let gold=value("gold");
let silver=value("silver");
let business=value("business");
let debts=value("debts");

let total=cash+gold+silver+business-debts;

let nisab=55000;

let result=document.getElementById("result");

if(total<=0){
result.innerHTML="No Zakat applicable.";
return;
}

if(total<nisab){
result.innerHTML="Wealth below Nisab.<br>Zakat not obligatory.";
return;
}

let zakat=total*0.025;

result.innerHTML=
`<b>Total Wealth:</b> ₹${total.toFixed(2)}
<br><b>Zakat Payable (2.5%):</b> ₹${zakat.toFixed(2)}`;
}

</script>

</body>
</html>
